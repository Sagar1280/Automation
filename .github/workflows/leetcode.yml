name: Daily LeetCode Questions

on:
  schedule:
    # Runs every day at 7:30 AM IST (2:00 AM UTC)
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      day_override:
        description: 'Override the day number (1-90). Leave empty for auto-tracking.'
        required: false
        default: ''

jobs:
  generate-and-send:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Determine current day
        id: day
        run: |
          if [ -n "${{ github.event.inputs.day_override }}" ]; then
            DAY="${{ github.event.inputs.day_override }}"
            echo "Using manual override: Day $DAY"
          elif [ -f "leetcode_day_tracker.txt" ]; then
            DAY=$(cat leetcode_day_tracker.txt)
            echo "Loaded from tracker: Day $DAY"
          else
            DAY=1
            echo "No tracker found, starting at Day 1"
          fi
          echo "day=$DAY" >> $GITHUB_OUTPUT

      - name: Generate LeetCode email
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          CURRENT_DAY: ${{ steps.day.outputs.day }}
        run: python scripts/generate_leetcode.py

      - name: Send LeetCode email
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          CURRENT_DAY: ${{ steps.day.outputs.day }}
        run: python scripts/send_leetcode_email.py

      - name: Advance day tracker
        if: success()
        run: |
          CURRENT=${{ steps.day.outputs.day }}
          NEXT=$((CURRENT + 1))
          if [ $NEXT -gt 90 ]; then
            NEXT=1
            echo "Cycle complete — resetting to Day 1"
          fi
          echo $NEXT > leetcode_day_tracker.txt
          echo "Next day will be: $NEXT"

      - name: Commit updated day tracker
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add leetcode_day_tracker.txt
          git diff --staged --quiet || git commit -m "chore: advance leetcode tracker to day $(cat leetcode_day_tracker.txt)"
          git push
